name: CI

on:
  pull_request:
    branches: [dev, main, staging]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key_for_build
          SUPABASE_SERVICE_ROLE_KEY: placeholder_service_role_key
          DATABASE_URL: postgresql://placeholder:placeholder@placeholder:5432/placeholder
          RAZORPAY_KEY_ID: rzp_test_placeholder
          RAZORPAY_KEY_SECRET: placeholder_razorpay_secret
          NEXT_PUBLIC_RAZORPAY_KEY_ID: rzp_test_placeholder
          RESEND_API_KEY: re_placeholder
          EMAIL_FROM: noreply@petpeep.in
          NEXT_PUBLIC_APP_URL: https://petpeep.in
          ADMIN_EMAIL: admin@petpeep.in
